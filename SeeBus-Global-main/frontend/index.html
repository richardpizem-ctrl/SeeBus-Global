<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SeeBus Global</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-container">

        <header>
            <h1>SeeBus Global – Live Announcements</h1>
        </header>

        <section class="panel controls-panel">
            <h2>Controls</h2>

            <div class="controls-row">

                <div class="control-block">
                    <label for="vehicle">Vehicle</label>
                    <select id="vehicle">
                        <option value="1">Vehicle 1</option>
                        <option value="2">Vehicle 2</option>
                        <option value="3">Vehicle 3</option>
                        <option value="4">Vehicle 4</option>
                        <option value="5">Vehicle 5</option>
                    </select>
                </div>

                <div class="control-block">
                    <label for="route">Route</label>
                    <select id="route">
                        <option value="24">24</option>
                        <option value="25">25</option>
                        <option value="26">26</option>
                        <option value="27">27</option>
                        <option value="99">99</option>
                    </select>
                </div>

                <div class="control-block">
                    <label for="language">Language</label>
                    <select id="language">
                        <option value="sk">Slovensky</option>
                        <option value="en">English</option>
                        <option value="de">Deutsch</option>
                        <option value="pl">Polski</option>
                        <option value="hu">Magyar</option>
                    </select>
                </div>

                <div class="control-buttons">
                    <button id="start">Start Stream</button>
                    <button id="stop">Stop Stream</button>
                </div>

            </div>
        </section>

        <section class="panel">
            <h2>Latest Announcement</h2>
            <pre id="message" class="message-box">Waiting...</pre>
        </section>

        <section class="panel">
            <h2>History Log</h2>
            <div id="log-list" class="log-list"></div>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
