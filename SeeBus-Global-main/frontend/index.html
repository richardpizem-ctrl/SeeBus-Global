<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SeeBus Global</title>

    <!-- Leaflet CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-container">

        <header>
            <h1>SeeBus Global – Live Announcements</h1>
        </header>

        <!-- ⭐ CONTROLS -->
        <section class="panel controls-panel">
            <h2>Controls</h2>

            <div class="controls-row">

                <div class="control-block">
                    <label for="language">Language</label>
                    <select id="language">
                        <option value="sk">Slovensky</option>
                        <option value="en">English</option>
                        <option value="de">Deutsch</option>
                        <option value="pl">Polski</option>
                        <option value="hu">Magyar</option>
                    </select>
                </div>

                <div class="control-buttons">
                    <button id="start">Start ALL Vehicles</button>
                    <button id="stop">Stop Stream</button>
                </div>

            </div>
        </section>

        <!-- ⭐ LIVE MAP -->
        <section class="panel">
            <h2>Live Map</h2>
            <div id="map"></div>
        </section>

        <!-- ⭐ INFO PANEL (DETAIL PO KLIKNUTÍ NA VOZIDLO) -->
        <section class="panel">
            <h2>Vehicle Info</h2>
            <div id="info" class="info-box">
                <b>Vozidlo:</b> - <br>
                <b>Linka:</b> - <br>
                <b>Ďalšia zastávka:</b> - <br>
                <b>ETA:</b> - <br>
                <b>Meškanie:</b> - <br>
            </div>
        </section>

        <!-- ⭐ ANNOUNCEMENT -->
        <section class="panel">
            <h2>Latest Announcement</h2>
            <pre id="message" class="message-box">Waiting...</pre>
        </section>

        <!-- ⭐ LOG -->
        <section class="panel">
            <h2>History Log</h2>
            <div id="log-list" class="log-list"></div>
        </section>

    </div>

    <!-- Leaflet JS -->
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>

    <script src="app.js"></script>
</body>
</html>
